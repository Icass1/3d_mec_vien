<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Three Fullscreen</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            #app {
                width: 100%;
                height: 100%;
            }
            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 100;">
            <button id="btn-stop-time">Stop Time</button>
            <button id="btn-stop-camera">Stop Camera</button>
        </div>
        <div id="chart-container" style="position: absolute; top: 50px; left: 10px; z-index: 100; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 4px;">
            <canvas id="speed-chart" width="400" height="200"></canvas>
        </div>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
